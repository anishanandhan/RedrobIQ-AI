[tool.pytest.ini_options]
addopts = "--cov=app --cov-report=term-missing --cov-fail-under=60"
testpaths = ["tests"]

[tool.coverage.report]
fail_under = 60
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "raise NotImplementedError",
    "except Exception"
]

[tool.mypy]
exclude = "(?x)(hf_space/|.*PUB.*)"


